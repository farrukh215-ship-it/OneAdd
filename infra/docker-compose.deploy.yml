services:
  postgres:
    image: postgres:16-alpine
    container_name: aikad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aikad_marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: aikad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: aikad-api
    restart: unless-stopped
    env_file:
      - ../services/api/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aikad_marketplace?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:-https://teragharmeraghar.com,https://www.teragharmeraghar.com}
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-/app/keys/firebase-admin.json}
    depends_on:
      - postgres
      - redis
    volumes:
      - ../keys:/app/keys:ro
      - ../uploads:/app/uploads
    expose:
      - "3001"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY:-AIzaSyCayPii-w6RumZ8Qjgs4NznNSQ4HatH3bs}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN:-aikad-13dc4.firebaseapp.com}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-aikad-13dc4}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID:-1:201729412856:web:f2400591798aa5454c350d}
    container_name: aikad-web
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://api:3001
    expose:
      - "3000"

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: aikad-admin
    restart: unless-stopped
    expose:
      - "3002"

  nginx:
    image: nginx:1.27-alpine
    container_name: aikad-nginx
    restart: unless-stopped
    depends_on:
      - api
      - web
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres-data:
  redis-data:
