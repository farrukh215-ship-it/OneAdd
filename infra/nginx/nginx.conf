worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 60m;

  upstream api_upstream {
    server api:3001;
  }

  upstream web_upstream {
    server web:3000;
  }

  upstream admin_upstream {
    server admin:3002;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name teragharmeraghar.com www.teragharmeraghar.com;
    return 301 https://www.teragharmeraghar.com$request_uri;
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name teragharmeraghar.com www.teragharmeraghar.com;

    ssl_certificate /etc/letsencrypt/live/teragharmeraghar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/teragharmeraghar.com/privkey.pem;

    proxy_http_version 1.1;

    if ($host = teragharmeraghar.com) {
      return 301 https://www.teragharmeraghar.com$request_uri;
    }

    location /api/ {
      proxy_pass http://api_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
      proxy_pass http://admin_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
      proxy_pass http://admin_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://web_upstream/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
